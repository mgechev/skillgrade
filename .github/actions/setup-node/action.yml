name: 'Setup Node.js'
description: 'Install Node.js from .node-version and run npm ci'
runs:
  using: 'composite'
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version-file: '.node-version'
        cache: 'npm'
    - name: Install dependencies
      run: npm ci
      shell: bash
